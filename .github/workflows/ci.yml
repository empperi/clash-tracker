# GitHub Actions CI/CD Workflow for Clash Tracker
#
# Trigger:
# - Runs tests, format checks, type checks, and lints on every push to any branch.
# - Deploys to Firebase Hosting, Firestore Rules, and Storage on push of tags matching `release-*` (only after tests pass).
#
# Required GitHub Secrets (Repository Settings -> Secrets and variables -> Actions):
# - FIREBASE_SERVICE_ACCOUNT_MILITIA_CLASH_TRACKER: JSON key of the Google Cloud/Firebase
#   service account used for deployment (created by `firebase github:init`). Must have
#   permissions to deploy Firebase Hosting, Firestore, and Cloud Storage.
# - CLASH_TOKEN_ENC_KEY: AES key for encrypting/decrypting the Clash of Clans API token (required in Track 2 functions).
#

name: CI/CD

on:
  push:
    branches:
      - '**'
    tags:
      - 'release-*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Lint code
        run: npm run lint

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run tests with Firebase Emulator
        run: npx firebase emulators:exec "npm test"
        env:
          VITE_USE_EMULATORS: 'true'

  deploy:
    name: Deploy to Firebase
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build applications
        run: npm run build
        env:
          # Production build: emulators OFF. The Firebase web config below is PUBLIC
          # (not secret) — set these as GitHub Actions *Variables*, not secrets.
          VITE_USE_EMULATORS: 'false'
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MILITIA_CLASH_TRACKER }}

      - name: Deploy to Firebase
        run: npx firebase deploy --only hosting,firestore:rules,storage
